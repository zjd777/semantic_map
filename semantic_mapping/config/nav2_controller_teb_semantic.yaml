controller_server:
  ros__parameters:
    odom_topic: /odom
    use_sim_time: False
    controller_frequency: 10.0

    # Progress checker parameters
    progress_checker_plugin: "progress_checker"
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.12
      movement_time_allowance: 7.0
    
    # Goal checker parameters
    goal_checker_plugins: ["goal_checker"] 
    goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.18
      yaw_goal_tolerance: 0.50

    controller_plugins: ["FollowPath"]
    controller_plugin_types: ["nav2_rotation_shim_controller::RotationShimController"]

    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"

      angular_dist_threshold: 1.2
      forward_sampling_distance: 0.45
      rotate_to_heading_angular_vel: 1.0
      max_angular_accel: 2.0
      simulate_ahead_time: 0.8

      primary_controller: "teb_local_planner::TebLocalPlannerROS"
      teb_autosize: 1.0
      dt_ref: 0.40
      dt_hysteresis: 0.1
      max_samples: 300
      global_plan_overwrite_orientation: True
      allow_init_with_backwards_motion: False
      max_global_plan_lookahead_dist: 1.6
      global_plan_viapoint_sep: 0.35
      global_plan_prune_distance: 1.0
      exact_arc_length: False
      feasibility_check_no_poses: 4
      publish_feedback: False
          
      # Robot
      max_vel_x: 0.4
      max_vel_theta: 2.0 
      acc_lim_x: 2.5
      acc_lim_theta: 3.2

      footprint_model: # types: "point", "circular", "two_circles", "line", "polygon"
        type: "two_circles"
        front_offset: 0.03
        front_radius: 0.13
        rear_offset: -0.01
        rear_radius: 0.13

      # GoalTolerance
      free_goal_vel: False
          
      # Obstacles
      min_obstacle_dist: 0.08
      inflation_dist: 0.22
      include_costmap_obstacles: True
      costmap_obstacles_behind_robot_dist: 1.0
      obstacle_poses_affected: 12

      dynamic_obstacle_inflation_dist: 0.35
      include_dynamic_obstacles: False

      costmap_converter_plugin: ""
      costmap_converter_spin_thread: False
      costmap_converter_rate: 2

      # Optimization
      no_inner_iterations: 4
      no_outer_iterations: 3
      optimization_activate: True
      optimization_verbose: False
      penalty_epsilon: 0.1
      obstacle_cost_exponent: 4.0
      weight_max_vel_x: 0.5
      weight_max_vel_theta: 0.5
      weight_acc_lim_x: 0.5
      weight_acc_lim_theta: 10.5
      weight_kinematics_nh: 1000.0
      weight_kinematics_forward_drive: 1.0
      weight_kinematics_turning_radius: 1.0
      weight_optimaltime: 0.7 # must be > 0
      weight_shortest_path: 0.2
      weight_obstacle: 120.0
      weight_inflation: 8.0
      weight_dynamic_obstacle: 10.0 # not in use yet
      weight_dynamic_obstacle_inflation: 0.2
      weight_viapoint: 25.0
      weight_adapt_factor: 2.0


      # Homotopy Class Planner
      enable_homotopy_class_planning: True
      enable_multithreading: False
      max_number_classes: 3
      selection_cost_hysteresis: 2.0
      selection_prefer_initial_plan: 0.6
      selection_obst_cost_scale: 3.0
      selection_alternative_time_cost: True

      roadmap_graph_no_samples: 12
      roadmap_graph_area_width: 3.0
      roadmap_graph_area_length_scale: 1.0
      h_signature_prescaler: 0.5
      h_signature_threshold: 0.1
      obstacle_heading_threshold: 0.45
      switching_blocking_period: 1.5
      viapoints_all_candidates: False
      delete_detours_backwards: True
      max_ratio_detours_duration_best_duration: 2.0
      visualize_hc_graph: False
      visualize_with_time_as_z_axis_scale: 0.0

      # Recovery
      shrink_horizon_backup: True
      shrink_horizon_min_duration: 10.0
      oscillation_recovery: True
      oscillation_v_eps: 0.05
      oscillation_omega_eps: 0.05
      oscillation_recovery_min_duration: 4.0
      oscillation_filter_duration: 5.0
controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False
